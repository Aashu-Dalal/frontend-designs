<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web player:Music for Everyone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <img src="/logos/spotify.png" alt="Spotify Logo">
            <img src="/logos/home.png" alt="Home Icon">
            <span>
                <div class="left"><img src="/logos/search.png" alt=""></div><input type="text"
                    placeholder="What do you want to play? ">
                <div class="right"><img src="/logos/browse.png" alt=""></div>
            </span>
            <ul class="nav-list-left">
                <li>Premium</li>
                <li>Support</li>
                <li>Download</li>
            </ul>
            <img class="line" src="/logos/line.png" />
            <ul class="nav-list-right">
                <li class="installing">
                    <div class="arrow">↓</div>
                    <span>Install App</span>
                </li>
                <li>Sign Up</li>
                <li><button class="log-in">Log In</button></li>
            </ul>
        </nav>
    </header>
    <div class="box">
        <div class="sidebar">
            <div class="heading">
                <h2>Your Library</h2>
                <span>+</span>
            </div>
            <div class="footer">
                <div><a href="https://www.spotify.com/in-en/legal/">Legal</a></div>
                <div><a href="https://www.spotify.com/in-en/safetyandprivacy/">Safety & Privacy Center</a></div>
                <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/">Privacy Policy</a></div>
                <div><a href="https://www.spotify.com/in-en/legal/cookies-policy/">Cookies</a></div>
                <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3">About Ads</a></div>
                <div><a href="https://www.spotify.com/in-en/accessibility/">Accessibility</a></div>
            </div>
            <div class="lang">
                
            </div>
        </div>
        <div class="container">
            <h2>Trending songs</h2>
        </div>
    </div>
</body>

</html>
