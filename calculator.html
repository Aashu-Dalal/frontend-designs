<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            
        }
        #screen{
            box-sizing: border-box;
            width: 85%;
            height: 60PX;
            margin: 8px;
            border: gray solid 2px;
            border-radius: 5px;
            font-size: 25px;
            text-align: right;
        }
        .container {
            width: 350px;
            height: 400px;
            background-color: #f0f0f0;
            margin: 50px auto;
            border: 2px solid;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .calculator {
            width: 85%;
            height: 85%;
            box-sizing: border-box;

            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 8px;
            padding: 8px;
        }

        .btn {
            width: 100%;
            height: 100%;
            font-size: 18px;
            border-radius: 18px;
            border: none;
            cursor: pointer;
        }
        .arithmetic{
            background-color: #ffcc00;
        }
        .other{
            background-color: #d0d0d0;
        }
        .number{
            background-color: #e9e9e9;
        }
        .btn:hover {
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <textarea id="screen"></textarea>
        <div class="calculator">
            <button class="btn other">^2</button>
            <button class="btn other">√x</button>
            <button class="btn other">⌫</button>
            <button class="btn arithmetic">/</button>
            <button class="btn number">7</button>
            <button class="btn number">8</button>
            <button class="btn number">9</button>
            <button class="btn arithmetic">X</button>
            <button class="btn number">4</button>
            <button class="btn number">5</button>
            <button class="btn number">6</button>
            <button class="btn arithmetic">+</button>
            <button class="btn number">1</button>
            <button class="btn number">2</button>
            <button class="btn number">3</button>
            <button class="btn arithmetic">-</button>
            <button class="btn number">0</button>
            <button class="btn other">CE</button>
            <button class="btn other">.</button>
            <button class="btn arithmetic">=</button>
        </div>
    </div>
<script>
    // Calculator functionality would go here
    let screen = document.getElementById('screen');
    let buttons = document.querySelectorAll('.btn');
    buttons.forEach(button => {
        button.addEventListener('click', () => {
            let value = button.textContent;
            if (value === 'CE') {
                screen.value = '';
            } else if (value === '⌫') {
                screen.value = screen.value.slice(0, -1);
            } else if (value === '=') {
                try {
                    // Replace 'X' with '*' for multiplication
                    let expression = screen.value.replace(/X/g, '*');
                    screen.value = eval(expression);
                } catch (e) {
                    screen.value = 'Error';
                }
            } else if (value === '^2') {
                try {
                    let num = parseFloat(screen.value);
                    screen.value = num * num;
                } catch (e) {
                    screen.value = 'Error';
                }
            } else if (value === '√x') {
                try {
                    let num = parseFloat(screen.value);
                    screen.value = Math.sqrt(num);
                } catch (e) {
                    screen.value = 'Error';
                }
            } else {
                screen.value += value;
            }
        });
    });

</script>
</body>

</html>
