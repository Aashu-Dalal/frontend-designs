<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-image: url("bg.jpg");
            background-size: cover;
            background-position: bottom;
            background-repeat: no-repeat;
            height: 100vh;
        }
        .app{
            color: rgb(15, 31, 52);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input {
            width: 25%;
        }

        button {
            cursor: pointer;
            background-color: rgb(197, 225, 243);

        }

        button:hover {
            background-color: rgb(173, 207, 233);
        }

        input,
        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        #container {
            margin-top: 20px;
            font-size: 18px;
        }
        .search{
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <div class="app">
        <h1>Weather App</h1>
        <div class="search">
            <input id="city" type="text" placeholder="Enter city name">
            <button id="btn">Get Weather</button>
        </div>

        <div id="container"></div>
    </div>
    <script>
        let btn = document.getElementById("btn");
        let container = document.getElementById("container");
        
    </script>
</body>

</html>
