<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>

<body>
    <form action="" method="post" onsubmit="return validateForm()">
        <h2>Registration Form</h2>
        Name: <input type="text" id="name" placeholder="Enter Your Name" ><br><br>
        Email: <input type="email" id="email" placeholder="Enter Your Email" ><br><br>
        Password:
        <input type="password" id="password" placeholder="Enter Your Password" ><br><br>
        Phone No: <input type="tel" id="number" placeholder="Enter Your Number"><br><br>
        Gender:
        <input type="radio" name="gender" id="male" value="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female" value="female">
        <label for="female">Female</label><br><br>
        <h4>Select Your Hobby</h4><input type="checkbox" name="hobby" id="reading" value="reading">
        <label for="reading">Reading</label><br>
        <input type="checkbox" name="hobby" id="playing" value="playing">
        <label for="playing">Playing</label><br>
        <input type="checkbox" name="hobby" id="singing" value="singing">
        <label for="singing">Singing</label><br>
        <input type="checkbox" name="hobby" id="exploring" value="exploring">
        <label for="exploring">Exploring</label><br>
        <input type="checkbox" name="hobby" id="travelling" value="travelling">
        <label for="travelling">Travelling</label><br>

        <h4>Select Your Education</h4>
        <select name="qualification">
            <option value="Matriculation">Matriculation</option>
            <option value="Higher Secondary">Higher Secondary</option>
            <option value="Graduate">Graduate</option>
            <option value="Post Graduate">Post Graduate</option>
            <option value="Doctorate">Doctorate</option>
        </select><br><br>
        <button>Submit</button>
    </form>
    <script>
        function validateForm() {
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            let number = document.getElementById("number").value;
            if(name ==""){
                alert("Please Enter Your Name");
                return false;
            }
            if(email ==""){
                alert("Please Enter Your Email");
                return false;
            }
            if(password ==""){
                alert("Please Enter Your Password");
                return false;
            }
            if(number ==""){
                alert("Please Enter Your Number");
                return false;
            }
            if(password.length<8){
                alert("Password Must Be At Least 8 Characters Long");
                return false;
            }
            alert("Form Submitted Successfully");
            return true;
        }
    </script>
</body>

</html>
