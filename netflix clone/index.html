<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <nav>
            <span>
                <img src="Logo.png" alt="logo">
                <ul>
                    <li><button class="lang">English</button></li>
                    <li><button class="signIn">Sign In</button></li>
                </ul>
            </span>
        </nav>
        <div class="box">
        </div>
        <div class="title">
            <p class="titlename">Unlimited movies, </p>
            <p class="titlename">shows, and more</p>
            <p class="label">Starts at ₹149. Cancel at any time.</p>
            <p class="label2">Ready to watch? Enter your email to create or restart your membership.</p>
            <div class="email">
                <input type="email" placeholder="Email address">
                <button>Get Started</button>
            </div>
        </div>
    </div>
        <div class="movies">
            <div class="card card1"></div>
            <div class="card card2"></div>
            <div class="card card3"></div>
            <div class="card card4"></div>
            <div class="card card5"></div>
            <div class="card card6"></div>
            <div class="card card7"></div>
            <div class="card card8"></div>
            <div class="card card9"></div>
            <div class="card card10"></div> 
        </div>

</body>

</html>
