<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav Bar</title>
    <style>
        .logo img{
            height: 56px;
            width: 160px;
        }
        nav{
            display: flex;
            justify-content: space-around;
        }
        .right ul{
            display: flex;
        }
        .right ul li{
            list-style: none;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><img src="logo.png" alt="Logo" ></div>
            <div class="right">
                <ul>
                    <li>Product</li>
                    <li>Buy</li>
                    <li>Renew</li>
                    <li>Support</li>
                    <li>Learn</li>
                    <li>Company</li>
                </ul>
            </div>
        </nav>
    </header>
</body>
</html>
